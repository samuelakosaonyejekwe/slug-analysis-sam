name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest
      - name: Lint (ruff)
        run: ruff check . || true          # advisory: surface lint without blocking the numerics build
      - name: Type-check (mypy)
        run: mypy solver.py || true        # advisory while array typing is incrementally added
      - name: Fast verification (closures + conservation)
        run: python solver.py --verify
      - name: Unit/regression tests
        run: pytest test_solver.py -q
